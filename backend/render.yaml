services:
  - type: web
    name: mirageml-backend
    env: node
    region: oregon
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: DB_HOST
        fromDatabase:
          name: mirageml-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: mirageml-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: mirageml-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: mirageml-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: mirageml-db
          property: password
      - key: FRONTEND_URL
        value: https://miruflow.onrender.com
      - key: RESEND_API_KEY
        sync: false

databases:
  - name: mirageml-db
    plan: free
    region: oregon
